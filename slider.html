<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slider</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        #slider,
        .carousel-inner {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .carousel-item {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 2;
        }

        .carousel-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: center;
        }

        .carousel-indicators,
        .carousel-control-prev,
        .carousel-control-next {
            z-index: 3 !important;
        }
    </style>
</head>

<body>
    <div id="slider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#slider" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#slider" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#slider" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#slider" data-bs-slide-to="3"></button>
            <button type="button" data-bs-target="#slider" data-bs-slide-to="4"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="Blue Night Sky Simple Quote Desktop Wallpaper.png" alt="" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Green Blue and White Illustrated Landscape Desktop Wallpaper.png" alt=""
                    class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Green Illustration Anime Desktop Wallpaper.png" alt="" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Yellow Green Fun Cute Colorfull Dekstop Wallpaper.png" alt="" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Pink and White Illustrated Girl Moon Desktop Wallpaper.png" alt="" class="d-block w-100">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    <script>
        // global function :
        const slides = document.querySelectorAll('.carousel-item');
        const indicators = document.querySelectorAll('button[data-bs-slide-to]');
        const slider = document.querySelector('#slider');
        let x;
        function changeSlide(direction = 1) {
            let currentIndex = [...slides].findIndex(s => s.classList.contains('active'));
            let newIndex = (currentIndex + direction + slides.length) % slides.length;
            document.querySelector('.carousel-item.active').classList.remove('active');
            document.querySelector('button.active').classList.remove('active');
            slides[newIndex].classList.add('active');
            indicators[newIndex].classList.add('active');
        };
        // sliding by indicators :
        indicators.forEach((btn, i) => {
            btn.addEventListener("click", () => {
                let current = [...slides].findIndex(s => s.classList.contains('active'));
                changeSlide(i - current);
            });
        });
        // sliding by previous arrow :
        document.querySelector('[data-bs-slide="prev"]').addEventListener("click", () => changeSlide(-1));
        // sliding by next arrow :
        document.querySelector('[data-bs-slide="next"]').addEventListener("click", () => changeSlide(1));
        // setting auto sliding :
        const start = () => x = setInterval(() => changeSlide(1), 2500);
        // auto sliding clear :
        const stop = () => clearInterval(x);
        slider.addEventListener("mouseover", stop);
        slider.addEventListener("mouseout", start);
        // initializing auto sliding :
        start();
    </script>
</body>

</html>
